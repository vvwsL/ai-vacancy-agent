# ============================================================================ #
#  НАСТРОЙКИ ПОЛЬЗОВАТЕЛЯ — меняй здесь, обычно этого достаточно.
# ============================================================================ #
resume_path: data/resume.txt   # твоё резюме: pdf / docx / txt / md
                               # вакансии берутся из data/vacancies.json (--input меняет файл)
# ============================================================================ #

top_n: 5                 # сколько вакансий разбирать агентом (топ по score)
max_desc_chars: 1200     # порог длины описания; выше — включается каскад сжатия
max_resume_chars: 6000   # сколько символов резюме отдавать в LLM при извлечении профиля
explain_rejected_n: 3    # сколько пограничных отсеянных объяснять (через LLM/код)

# Профиль кандидата для hard-фильтра (что отсекаем сразу, до scoring).
# Уровни senior/lead/head не подходят junior-кандидату.
reject_levels: [senior, lead, head, principal, staff]

# Веса scoring. Сумма ~1.0. Score = sum(вес_i * признак_i) * 100.
# Обоснование весов (это спросят на защите):
weights:
  skill_overlap: 0.40    # ГЛАВНЫЙ сигнал релевантности для джуна — совпадение стека.
                         # Технологии решают, подойдёт ли человек, сильнее чем формат/город.
  role_match:    0.25    # вторая по важности — та ли это роль (ML/AI vs смежное).
  level_match:   0.15    # стажёр/junior против "не указан"; явный junior лучше "middle".
  freshness:     0.10    # свежесть публикации: стажировки быстро закрываются,
                         # но это слабее технического соответствия.
  work_format:   0.07    # remote/гибрид — приятно, но не определяет пригодность.
  city_match:    0.03    # самый слабый сигнал: кандидат ищет remote, город вторичен.

# Параметры LLM-агента.
llm:
  provider: auto         # auto | groq | openrouter | cerebras | dryrun
                         # auto: первый провайдер, для которого есть ключ в .env; иначе dryrun
  # Модели можно переопределить (иначе берётся дефолт провайдера из src/llm.py PROVIDERS):
  model_groq: llama-3.3-70b-versatile
  temperature: 0.0       # детерминизм, насколько возможно для воспроизводимости
  max_agent_steps: 3     # лимит итераций tool-loop — защита от зацикливания (и экономия вызовов)
  request_timeout: 40    # сек на один HTTP-запрос к модели
  max_retries: 4         # ретраи на 429/сеть с backoff
  rpm: 10                # макс. запросов в минуту к LLM (троттлинг против 429-burst free-tier)
